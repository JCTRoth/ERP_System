apiVersion: v2
name: erp-system
description: ERP System Helm Chart - Kubernetes deployment for microservices architecture
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - erp
  - microservices
  - kubernetes
  - graphql
maintainers:
  - name: ERP Team
dependencies:
  # Removed Bitnami dependencies to avoid commercial image breakage.
  # PostgreSQL and MinIO are provided as in-chart resources or
  # handled by alternative operators / mirrors. Keep Prometheus/Grafana.
  - name: prometheus
    version: "25.0.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: grafana
    version: "7.0.0"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
