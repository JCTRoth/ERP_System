# =============================================================================
# Global Configuration
# =============================================================================
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""
  baseUrl: "http://localhost"

# =============================================================================
# Common Settings
# =============================================================================
replicaCount: 1
environment: development

image:
  pullPolicy: IfNotPresent

# =============================================================================
# Services Configuration
# =============================================================================
services:
  # Frontend (React)
  frontend:
    enabled: true
    image:
      repository: erp/frontend
      tag: latest
    port: 3000
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # Apollo Gateway
  gateway:
    enabled: true
    image:
      repository: erp/gateway
      tag: latest
    port: 4000
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 256Mi

  # .NET Services
  userService:
    enabled: true
    image:
      repository: erp/user-service
      tag: latest
    port: 5000
    database:
      name: userdb
      user: erp_user
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  shopService:
    enabled: true
    image:
      repository: erp/shop-service
      tag: latest
    port: 5003
    database:
      name: shopdb
      user: erp_shop
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  accountingService:
    enabled: true
    image:
      repository: erp/accounting-service
      tag: "1.4"
    port: 5001
    database:
      name: accountingdb
      user: erp_accounting
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  masterdataService:
    enabled: true
    image:
      repository: erp/masterdata-service
      tag: latest
    port: 5002
    database:
      name: masterdatadb
      user: erp_masterdata
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  ordersService:
    enabled: true
    image:
      repository: erp/orders-service
      tag: latest
    port: 5004
    database:
      name: ordersdb
      user: erp_orders
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # Java Services
  companyService:
    enabled: true
    image:
      repository: erp/company-service
      tag: latest
    port: 8080
    database:
      name: companydb
      user: erp_company
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 512Mi

  translationService:
    enabled: true
    image:
      repository: erp/translation-service
      tag: latest
    port: 8081
    database:
      name: translationdb
      user: erp_translation
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  templatesService:
    enabled: true
    image:
      repository: erp/templates-service
      tag: latest
    port: 8087
    database:
      name: templatesdb
      user: erp_templates
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  notificationService:
    enabled: true
    image:
      repository: erp/notification-service
      tag: latest
    port: 8082
    database:
      name: notificationdb
      user: erp_notification
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  scriptingService:
    enabled: true
    image:
      repository: erp/scripting-service
      tag: latest
    port: 8083
    database:
      name: scriptingdb
      user: erp_scripting
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 512Mi

  edifactService:
    enabled: true
    image:
      repository: erp/edifact-service
      tag: latest
    port: 8084
    database:
      name: edifactdb
      user: erp_edifact
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

# =============================================================================
# Ingress Configuration
# =============================================================================
ingress:
  enabled: true
  className: traefik
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"
  hosts:
    - host: erp.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /graphql
          pathType: Prefix
          service: gateway
        - path: /api
          pathType: Prefix
          service: gateway
  tls: []

# =============================================================================
# PostgreSQL (Bitnami)
# =============================================================================
postgresql:
  enabled: true
  auth:
    postgresPassword: "changeme"  # Keep in sync with secrets.postgresPassword
    database: erpdb
  primary:
  initdb:
    scripts:
    init-multi-db.sh: |-
      #!/usr/bin/env bash
      set -e

      DB_PASS="${POSTGRES_PASSWORD}"

      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<EOSQL
      -- Create all users first with CREATEDB privilege for EnsureCreated()
      DO $$
      BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'erp_user') THEN
          CREATE USER erp_user WITH ENCRYPTED PASSWORD '$DB_PASS' CREATEDB;
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'erp_company') THEN
          CREATE USER erp_company WITH ENCRYPTED PASSWORD '$DB_PASS' CREATEDB;
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'erp_translation') THEN
          CREATE USER erp_translation WITH ENCRYPTED PASSWORD '$DB_PASS' CREATEDB;
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'erp_shop') THEN
          CREATE USER erp_shop WITH ENCRYPTED PASSWORD '$DB_PASS' CREATEDB;
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'erp_orders') THEN
          CREATE USER erp_orders WITH ENCRYPTED PASSWORD '$DB_PASS' CREATEDB;
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'erp_accounting') THEN
          CREATE USER erp_accounting WITH ENCRYPTED PASSWORD '$DB_PASS' CREATEDB;
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'erp_masterdata') THEN
          CREATE USER erp_masterdata WITH ENCRYPTED PASSWORD '$DB_PASS' CREATEDB;
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'erp_notification') THEN
          CREATE USER erp_notification WITH ENCRYPTED PASSWORD '$DB_PASS' CREATEDB;
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'erp_scripting') THEN
          CREATE USER erp_scripting WITH ENCRYPTED PASSWORD '$DB_PASS' CREATEDB;
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'erp_edifact') THEN
          CREATE USER erp_edifact WITH ENCRYPTED PASSWORD '$DB_PASS' CREATEDB;
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'erp_templates') THEN
          CREATE USER erp_templates WITH ENCRYPTED PASSWORD '$DB_PASS' CREATEDB;
        END IF;
      END $$;
      EOSQL

      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<'EOSQL'
      SELECT 'CREATE DATABASE userdb OWNER erp_user'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'userdb')\gexec

      SELECT 'CREATE DATABASE companydb OWNER erp_company'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'companydb')\gexec

      SELECT 'CREATE DATABASE translationdb OWNER erp_translation'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'translationdb')\gexec

      SELECT 'CREATE DATABASE shopdb OWNER erp_shop'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'shopdb')\gexec

      SELECT 'CREATE DATABASE ordersdb OWNER erp_orders'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'ordersdb')\gexec

      SELECT 'CREATE DATABASE accountingdb OWNER erp_accounting'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'accountingdb')\gexec

      SELECT 'CREATE DATABASE masterdatadb OWNER erp_masterdata'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'masterdatadb')\gexec

      SELECT 'CREATE DATABASE notificationdb OWNER erp_notification'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'notificationdb')\gexec

      SELECT 'CREATE DATABASE scriptingdb OWNER erp_scripting'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'scriptingdb')\gexec

      SELECT 'CREATE DATABASE edifactdb OWNER erp_edifact'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'edifactdb')\gexec

      SELECT 'CREATE DATABASE templatesdb OWNER erp_templates'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'templatesdb')\gexec
      EOSQL
    persistence:
      enabled: true
      size: 10Gi
  metrics:
    enabled: true

# =============================================================================
# Kafka (Bitnami)
# =============================================================================
kafka:
  enabled: true
  replicaCount: 1
  persistence:
    enabled: true
    size: 10Gi
  zookeeper:
    enabled: true
    persistence:
      enabled: true
      size: 5Gi
  metrics:
    kafka:
      enabled: true
    jmx:
      enabled: true

# =============================================================================
# MinIO (S3-compatible storage)
# =============================================================================
minio:
  enabled: true
  mode: standalone
  persistence:
    enabled: true
    size: 10Gi
  defaultBuckets: "company-logos,exports,imports"

# =============================================================================
# Monitoring
# =============================================================================
prometheus:
  enabled: true
  server:
    persistentVolume:
      enabled: true
      size: 10Gi

grafana:
  enabled: true
  persistence:
    enabled: true
    size: 5Gi
  adminUser: admin
  adminPassword: ""  # Set via secret

# =============================================================================
# SMTP
# =============================================================================
smtp:
  host: ""
  port: 587

# =============================================================================
# Security
# =============================================================================
networkPolicy:
  enabled: true

podSecurityPolicy:
  enabled: false

serviceAccount:
  create: true
  name: ""

# =============================================================================
# Secrets (reference external secrets or create)
# =============================================================================
secrets:
  # Database passwords
  postgresPassword: "changeme"  # Override per environment; must match postgresql.auth.postgresPassword
  
  # SMTP credentials
  smtpUsername: ""
  smtpPassword: ""
  
  # MinIO credentials
  minioRootUser: minioadmin
  minioRootPassword: ""
  
  # JWT secret for auth
  jwtSecret: ""
  
  # Super admin email
  superAdminEmail: ""
