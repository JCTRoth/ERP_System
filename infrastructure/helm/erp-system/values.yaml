# =============================================================================
# Global Configuration
# =============================================================================
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: "local-path"
  baseUrl: "http://localhost"

# =============================================================================
# Common Settings
# =============================================================================
replicaCount: 1
environment: development

image:
  pullPolicy: IfNotPresent

# =============================================================================
# Services Configuration
# =============================================================================
services:
  # Frontend (React)
  frontend:
    enabled: true
    image:
      repository: erp/frontend
      tag: latest
    port: 3000
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # Apollo Gateway
  gateway:
    enabled: true
    image:
      repository: erp/gateway
      tag: latest
    port: 4000
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 256Mi

  # .NET Services
  userService:
    enabled: true
    image:
      repository: erp/user-service
      tag: latest
    port: 5000
    database:
      name: userdb
      user: erp_user
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  shopService:
    enabled: true
    image:
      repository: erp/shop-service
      tag: latest
    port: 5003
    database:
      name: shopdb
      user: erp_shop
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  accountingService:
    enabled: true
    image:
      repository: erp/accounting-service
      tag: "1.4"
    port: 5001
    database:
      name: accountingdb
      user: erp_accounting
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  masterdataService:
    enabled: true
    image:
      repository: erp/masterdata-service
      tag: latest
    port: 5002
    database:
      name: masterdatadb
      user: erp_masterdata
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  ordersService:
    enabled: true
    image:
      repository: erp/orders-service
      tag: latest
    port: 5004
    database:
      name: ordersdb
      user: erp_orders
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # Java Services
  companyService:
    enabled: true
    image:
      repository: erp/company-service
      tag: latest
    port: 8080
    database:
      name: companydb
      user: erp_company
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 512Mi

  translationService:
    enabled: true
    image:
      repository: erp/translation-service
      tag: latest
    port: 8081
    database:
      name: translationdb
      user: erp_translation
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  templatesService:
    enabled: true
    image:
      repository: erp/templates-service
      tag: latest
    port: 8087
    database:
      name: templatesdb
      user: erp_templates
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  notificationService:
    enabled: true
    image:
      repository: erp/notification-service
      tag: latest
    port: 8082
    database:
      name: notificationdb
      user: erp_notification
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  scriptingService:
    enabled: true
    image:
      repository: erp/scripting-service
      tag: latest
    port: 8083
    database:
      name: scriptingdb
      user: erp_scripting
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 512Mi

  edifactService:
    enabled: true
    image:
      repository: erp/edifact-service
      tag: latest
    port: 8084
    database:
      name: edifactdb
      user: erp_edifact
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

# =============================================================================
# Ingress Configuration
# =============================================================================
ingress:
  enabled: true
  className: traefik
  annotations:
    # Traefik (K3s default ingress controller) annotations
    traefik.ingress.kubernetes.io/router.entrypoints: web
  hosts:
    - host: erp.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /graphql
          pathType: Prefix
          service: gateway
        - path: /api
          pathType: Prefix
          service: gateway
  tls: []

# =============================================================================
# PostgreSQL (Bitnami)
# =============================================================================
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  replicaCount: 1
  user: postgres
  database: postgres
  persistence:
    size: 10Gi
  resources: {}
  initImage:
    repository: postgres
    tag: 16-alpine
    persistence:
      enabled: true
      size: 10Gi
  metrics:
    enabled: true

# =============================================================================
# MinIO (S3-compatible storage)
# =============================================================================
minio:
  enabled: true
  mode: standalone
  publicUrl: ""
  persistence:
    enabled: true
    size: 10Gi
  defaultBuckets: "company-logos,exports,imports"

# =============================================================================
# Mailpit (local SMTP sink for non-production environments)
# =============================================================================
mailpit:
  enabled: false
  image:
    repository: axllent/mailpit
    tag: latest
  smtpPort: 1025
  httpPort: 8025

# =============================================================================
# Monitoring
# =============================================================================
prometheus:
  enabled: true
  server:
    persistentVolume:
      enabled: true
      size: 10Gi

grafana:
  enabled: true
  persistence:
    enabled: true
    size: 5Gi
  adminUser: admin
  adminPassword: ""  # Set via secret

# =============================================================================
# SMTP
# =============================================================================
smtp:
  host: ""
  port: 587
  auth: true
  starttls:
    enabled: true
    required: true
  fromAddress: ""
  fromName: "ERP System"

# =============================================================================
# Security
# =============================================================================
networkPolicy:
  enabled: true

podSecurityPolicy:
  enabled: false

serviceAccount:
  create: true
  name: ""

# =============================================================================
# Secrets (reference external secrets or create)
# =============================================================================
secrets:
  # Database passwords
  postgresPassword: "changeme"  # Override per environment; must match postgresql.auth.postgresPassword
  
  # SMTP credentials
  smtpUsername: ""
  smtpPassword: ""
  
  # MinIO credentials
  minioRootUser: minioadmin
  minioRootPassword: ""
  
  # JWT secret for auth
  jwtSecret: ""
  
  # Super admin email
  superAdminEmail: ""
