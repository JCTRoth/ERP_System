{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "erp-system.fullname" . }}-postgresql
  labels:
    {{- include "erp-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  clusterIP: None
  selector:
    {{- include "erp-system.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
{{- end }}
