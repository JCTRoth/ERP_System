{{- if .Values.postgresql.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "erp-system.fullname" . }}-postgres-init
  labels:
    {{- include "erp-system.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "erp-system.selectorLabels" . | nindent 8 }}
        job: postgres-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-db
          image: "{{ .Values.postgresql.initImage.repository }}:{{ .Values.postgresql.initImage.tag }}"
          imagePullPolicy: {{ .Values.postgresql.initImage.pullPolicy | default $.Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              until pg_isready -h {{ include "erp-system.fullname" $ }}-postgresql -U {{ .Values.postgresql.user }}; do
                echo "waiting for postgres..."
                sleep 2
              done
              PGPASSWORD=$(cat /secrets/postgres-password) psql -h {{ include "erp-system.fullname" $ }}-postgresql -U {{ .Values.postgresql.user }} -d {{ .Values.postgresql.database }} -f /init/init.sql
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "erp-system.fullname" . }}-secrets
                  key: postgres-password
          volumeMounts:
            - name: init-sql
              mountPath: /init
              readOnly: true
      volumes:
        - name: init-sql
          configMap:
            name: {{ include "erp-system.fullname" . }}-postgres-init-sql
{{- end }}
{{- if .Values.postgresql.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "erp-system.fullname" . }}-postgres-init
  labels:
    {{- include "erp-system.labels" . | nindent 4 }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "erp-system.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: "{{ .Values.postgresql.initImage.repository | default "postgres" }}:{{ .Values.postgresql.initImage.tag | default "16-alpine" }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "erp-system.fullname" . }}-secrets
                  key: postgres-password
          command:
            - sh
            - -c
            - |
              # wait for postgres to be ready
              until pg_isready -h {{ include "erp-system.fullname" $ }}-postgresql -p 5432 -U {{ .Values.postgresql.user | default "postgres" }}; do
                echo "waiting for postgres..."
                sleep 2
              done
              echo "postgres is ready, running init.sql"
              psql -h {{ include "erp-system.fullname" $ }}-postgresql -U {{ .Values.postgresql.user | default "postgres" }} -f /tmp/init.sql
          volumeMounts:
            - name: init-sql
              mountPath: /tmp/init.sql
              subPath: init.sql
      volumes:
        - name: init-sql
          configMap:
            name: {{ include "erp-system.fullname" . }}-postgres-init-sql
{{- end }}
