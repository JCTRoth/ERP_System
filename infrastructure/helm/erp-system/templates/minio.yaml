{{- if .Values.minio.enabled }}
{{- $fullname := include "erp-system.fullname" . -}}
{{- $labels := include "erp-system.labels" . -}}
{{- $minioStorageClass := .Values.global.storageClass -}}
{{- $existingMinioPvc := lookup "v1" "PersistentVolumeClaim" .Release.Namespace (printf "%s-minio-data" $fullname) -}}
{{- if and (not $minioStorageClass) $existingMinioPvc -}}
{{- $minioStorageClass = $existingMinioPvc.spec.storageClassName -}}
{{- end -}}
{{- if .Values.minio.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}-minio-data
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.minio.persistence.size | default "10Gi" }}
  {{- with $minioStorageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-minio
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "erp-system.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        {{- include "erp-system.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      serviceAccountName: {{ include "erp-system.serviceAccountName" . }}
      containers:
        - name: minio
          image: "minio/minio:RELEASE.2025-04-08T15-41-24Z"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.secrets.minioRootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-secrets
                  key: minio-root-password
          ports:
            - name: api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.minio.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ $fullname }}-minio-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-minio
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 9000
      targetPort: api
      protocol: TCP
    - name: console
      port: 9001
      targetPort: console
      protocol: TCP
  selector:
    {{- include "erp-system.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
{{- end }}
