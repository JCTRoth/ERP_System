{{- if .Values.postgresql.enabled }}
{{- $fullname := include "erp-system.fullname" . -}}
{{- $postgresStorageClass := .Values.global.storageClass -}}
{{- $existingPostgres := lookup "apps/v1" "StatefulSet" .Release.Namespace (printf "%s-postgresql" $fullname) -}}
{{- if and (not $postgresStorageClass) $existingPostgres (gt (len $existingPostgres.spec.volumeClaimTemplates) 0) -}}
{{- $postgresStorageClass = (index $existingPostgres.spec.volumeClaimTemplates 0).spec.storageClassName -}}
{{- end -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}-postgresql
  labels:
    {{- include "erp-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  serviceName: {{ $fullname }}-postgresql
  replicas: {{ .Values.postgresql.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "erp-system.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "erp-system.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy | default $.Values.image.pullPolicy }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "erp-system.fullname" . }}-secrets
                  key: postgres-password
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size | default "10Gi" }}
        {{- if $postgresStorageClass }}
        storageClassName: {{ $postgresStorageClass | quote }}
        {{- end }}
{{- end }}
