apiVersion: v1
kind: Secret
metadata:
  name: {{ include "erp-system.fullname" . }}-secrets
  labels:
    {{- include "erp-system.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $postgresPassword := coalesce .Values.secrets.postgresPassword .Values.postgresql.auth.postgresPassword }}
  {{- if not $postgresPassword }}
  {{- fail "postgres password is required; set secrets.postgresPassword and postgresql.auth.postgresPassword to the same value" }}
  {{- end }}
  postgres-password: {{ $postgresPassword | b64enc | quote }}
  
  smtp-username: {{ default "" .Values.secrets.smtpUsername | b64enc | quote }}
  smtp-password: {{ default "" .Values.secrets.smtpPassword | b64enc | quote }}
  
  {{- if .Values.secrets.minioRootPassword }}
  minio-root-password: {{ .Values.secrets.minioRootPassword | b64enc | quote }}
  {{- else }}
  minio-root-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  
  {{- if .Values.secrets.jwtSecret }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- else }}
  jwt-secret: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}
  
  {{- if .Values.secrets.superAdminEmail }}
  super-admin-email: {{ .Values.secrets.superAdminEmail | b64enc | quote }}
  {{- end }}
