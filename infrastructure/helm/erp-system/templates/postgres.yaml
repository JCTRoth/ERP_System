{{- if .Values.postgresql.enabled }}
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "erp-system.fullname" . }}-postgresql
  labels:
    {{- include "erp-system.labels" . | nindent 4 }}
spec:
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  clusterIP: None
  selector:
    {{- include "erp-system.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "erp-system.fullname" . }}-postgresql
  labels:
    {{- include "erp-system.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "erp-system.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  serviceName: {{ include "erp-system.fullname" . }}-postgresql
  replicas: {{ .Values.postgresql.replicaCount | default 1 }}
  template:
    metadata:
      labels:
        {{- include "erp-system.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.registry | default "" }}{{ .Values.postgresql.image.repository | default "postgres" }}:{{ .Values.postgresql.image.tag | default "16-alpine" }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "erp-system.fullname" . }}-secrets
                  key: postgres-password
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.user | default "postgres" | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | default "postgres" | quote }}
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: pgdata
        annotations: {}
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size | default "10Gi" }}
{{- end }}
