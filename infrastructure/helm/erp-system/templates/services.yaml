              value: "false"
            - name: Minio__PublicUrl
              value: {{ printf "https://%s/minio" (.Values.global.baseUrl | trimPrefix "https://" | trimPrefix "http://") | quote }}
            - name: Services__TemplatesService
              value: "http://{{ $fullname }}-templates-service:{{ .Values.services.templatesService.port }}"
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.services.shopService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-shop-service
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: shop-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.services.shopService.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "erp-system.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: shop-service
{{- end }}

