---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-edifact-service
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: edifact-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.services.edifactService.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "erp-system.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: edifact-service
{{- end }}

{{/* =============================
     Node.js Services
============================= */}}
{{- if .Values.services.templatesService.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-templates-service
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: templates-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "erp-system.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: templates-service
  template:
    metadata:
      labels:
        {{- include "erp-system.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: templates-service
    spec:
      serviceAccountName: {{ include "erp-system.serviceAccountName" . }}
      containers:
        - name: templates-service
          image: "{{ .Values.global.imageRegistry }}{{ .Values.services.templatesService.image.repository }}:{{ .Values.services.templatesService.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.services.templatesService.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ default "production" .Values.environment | quote }}
            - name: PORT
              value: {{ .Values.services.templatesService.port | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.services.templatesService.database.user }}:$(POSTGRES_PASSWORD)@{{ $fullname }}-postgresql:5432/{{ .Values.services.templatesService.database.name }}"
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.services.templatesService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-templates-service
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: templates-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.services.templatesService.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "erp-system.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: templates-service
{{- end }}
