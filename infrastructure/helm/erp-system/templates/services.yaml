{{- if .Values.services.companyService.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-company-service
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: company-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "erp-system.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: company-service
  template:
    metadata:
      labels:
        {{- include "erp-system.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: company-service
    spec:
      serviceAccountName: {{ include "erp-system.serviceAccountName" . }}
      containers:
        - name: company-service
          image: "{{ .Values.global.imageRegistry }}{{ .Values.services.companyService.image.repository }}:{{ .Values.services.companyService.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.services.companyService.port }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ $fullname }}-postgresql:5432/{{ .Values.services.companyService.database.name }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.services.companyService.database.user | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-secrets
                  key: postgres-password
            - name: SPRING_AUTOCONFIGURE_EXCLUDE
              value: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 8
            periodSeconds: 10
          resources:
            {{- toYaml .Values.services.companyService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-company-service
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: company-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.services.companyService.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "erp-system.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: company-service
{{- end }}

