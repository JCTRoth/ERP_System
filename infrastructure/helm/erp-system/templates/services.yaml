          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.services.shopService.port }}
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.environment | quote }}
            - name: ASPNETCORE_URLS
              value: "http://*:{{ .Values.services.shopService.port }}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-secrets
                  key: postgres-password
            - name: ConnectionStrings__DefaultConnection
              value: {{ include "erp-system.databaseUrl" (dict "dbName" .Values.services.shopService.database.name "dbUser" .Values.services.shopService.database.user "Release" .Release "Chart" .Chart) }}
            - name: Database__EnableSeeding
              value: "true"
            - name: Minio__Endpoint
              value: "http://{{ $fullname }}-minio:9000"
            - name: Minio__AccessKey
              value: {{ .Values.secrets.minioRootUser | quote }}
            - name: Minio__SecretKey
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-secrets
                  key: minio-root-password
