{{- /* Backend services (Dotnet, Java, Node) */ -}}

{{/* Helper to shorten names */}}
{{- $fullname := include "erp-system.fullname" . -}}
{{- $labels := include "erp-system.labels" . -}}

{{/* =============================
     .NET Services
============================= */}}
{{- if .Values.services.userService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-user-service
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: user-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "erp-system.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: user-service
  template:
    metadata:
      labels:
        {{- include "erp-system.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: user-service
    spec:
      serviceAccountName: {{ include "erp-system.serviceAccountName" . }}
      containers:
        - name: user-service
          image: "{{ .Values.global.imageRegistry }}{{ .Values.services.userService.image.repository }}:{{ .Values.services.userService.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.services.userService.port }}
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.environment | quote }}
            - name: ASPNETCORE_URLS
              value: "http://*:{{ .Values.services.userService.port }}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-secrets
                  key: postgres-password
            - name: ConnectionStrings__DefaultConnection
              value: {{ include "erp-system.databaseUrl" (dict "dbName" .Values.services.userService.database.name "dbUser" .Values.services.userService.database.user "Release" .Release "Chart" .Chart) }}
            - name: Database__EnableSeeding
              value: "true"
            - name: JWT__Secret
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-secrets
                  key: jwt-secret
            - name: JWT__Issuer
              value: "erp-system"
            - name: JWT__Audience
              value: "erp-clients"
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.services.userService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-user-service
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: user-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.services.userService.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "erp-system.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: user-service
{{- end }}

